---
# glusterfs-setup.yml - Khởi tạo hạ tầng Distributed Storage chuẩn Enterprise
# Chạy bởi: swarm-ctl storage init-glusterfs --nodes IP1,IP2,IP3

- name: "☁️ Triển khai GlusterFS Distributed Storage"
  hosts: storage_nodes
  become: true
  gather_facts: true

  vars:
    data_root: "/opt/data"
    gluster_vol: "swarm_data"

  tasks:
    - name: Cài đặt GlusterFS packages
      apt:
        name:
          - glusterfs-server
          - glusterfs-client
          - xfsprogs
        state: present
        update_cache: true

    - name: Khởi động dịch vụ Glusterd
      systemd:
        name: glusterd
        state: started
        enabled: true

    - name: Đảm bảo thư mục lưu trữ cục bộ tồn tại (Brick path)
      file:
        path: "/mnt/gluster_brick/{{ gluster_vol }}"
        state: directory
        mode: '0755'

    - name: Dừng tạm thời thời gian để chờ các node khởi động Glusterd (10s)
      pause:
        seconds: 10
      when: inventory_hostname == groups['storage_nodes'][0]

    # Node Master (Host đầu tiên) thực hiện Peer Probe tới đàn em
    - name: Nối các Node với nhau (Peer Probe)
      command: "gluster peer probe {{ item }}"
      register: peer_probe
      changed_when: "'peer probe: success' in peer_probe.stdout"
      failed_when: "'success' not in peer_probe.stdout and 'already in peer list' not in peer_probe.stdout"
      loop: "{{ groups['storage_nodes'] }}"
      when:
        - inventory_hostname == groups['storage_nodes'][0]
        - item != inventory_hostname

    - name: Đợi cluster đồng bộ
      pause:
        seconds: 5
      when: inventory_hostname == groups['storage_nodes'][0]

    - name: Tạo Replicated Volume (Copy dữ liệu trên mọi Node ra X bản)
      command: >
        gluster volume create {{ gluster_vol }} replica {{ groups['storage_nodes'] | length }}
        transport tcp
        {% for host in groups['storage_nodes'] %}
        {{ host }}:/mnt/gluster_brick/{{ gluster_vol }}
        {% endfor %}
        force
      when: inventory_hostname == groups['storage_nodes'][0]
      ignore_errors: true

    - name: Khởi động Gluster Volume
      command: "gluster volume start {{ gluster_vol }}"
      when: inventory_hostname == groups['storage_nodes'][0]
      ignore_errors: true

    - name: Tinh chỉnh GlusterFS để tối ưu cho số lượng file nhỏ
      command: "gluster volume set {{ gluster_vol }} {{ item.key }} {{ item.val }}"
      loop:
        - { key: 'network.ping-timeout', val: '5' }
        - { key: 'performance.cache-size', val: '256MB' }
      when: inventory_hostname == groups['storage_nodes'][0]
      ignore_errors: true

    - name: Tạo thư mục gộp Mount-point dùng cho toàn cụm
      file:
        path: "{{ data_root }}/shared"
        state: directory
        mode: '0755'

    - name: Auto-Mount GlusterFS qua fstab
      mount:
        name: "{{ data_root }}/shared"
        src: "localhost:/{{ gluster_vol }}"
        fstype: "glusterfs"
        opts: "defaults,_netdev,backupvolfile-server=localhost"
        state: mounted

    - name: Kiểm tra trạng thái Cluster
      command: "gluster volume info"
      register: gluster_info
      when: inventory_hostname == groups['storage_nodes'][0]

    - name: Dump Log
      debug:
        msg: "{{ gluster_info.stdout_lines }}"
      when: inventory_hostname == groups['storage_nodes'][0]
