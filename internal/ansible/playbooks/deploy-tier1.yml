---
# deploy-tier1.yml - Deploy Tier 1: Infrastructure services
# Traefik + Portainer (bắt buộc, deploy trước tất cả)

- name: "🔧 Deploy Tier 1: Infrastructure"
  hosts: nodes
  become: true
  gather_facts: false

  vars:
    data_root: "/opt/data"
    domain: ""
    cf_dns_api_token: ""
    acme_email: "admin@{{ domain }}"
    portainer_admin_password: ""

  tasks:

    # ── 1. Create Traefik Data directory ──────────────────────
    - name: Ensure certificates directory exists
      file:
        path: "{{ data_root }}/traefik/certs"
        state: directory
        mode: '0755'

    # ── 2. Deploy Traefik ─────────────────────────────────────
    - name: Create Traefik compose file
      copy:
        dest: /tmp/traefik-compose.yml
        content: |
          version: '3.8'

          services:
            traefik:
              image: traefik:v3.6.2
              command:
                - "--api.dashboard=true"
                - "--ping=true"
                - "--log.level=INFO"
                - "--accesslog=true"
                - "--providers.swarm=true"
                - "--providers.swarm.exposedByDefault=false"
                - "--providers.swarm.network=proxy_public"
                - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
                - "--entrypoints.http.address=:80"
                - "--entrypoints.https.address=:443"
                - "--entrypoints.http.http.redirections.entrypoint.to=https"
                - "--entrypoints.http.http.redirections.entrypoint.scheme=https"
                # Cấu hình HTTPS bảo mật bằng ACME TLS Challenge Default (Vì không dùng Cloudflare Token)
                - "--certificatesresolvers.le.acme.tlschallenge=true"
                - "--certificatesresolvers.le.acme.email={{ acme_email }}"
                - "--certificatesresolvers.le.acme.storage=/certificates/acme.json"
                - "--entrypoints.https.http.tls.options=secure-tls-options@docker"
                - "--serverstransport.insecureSkipVerify=true"
                - "--metrics.prometheus=true"
                - "--metrics.prometheus.addRoutersLabels=true"
              ports:
                - target: 80
                  published: 80
                  mode: host
                  protocol: tcp
                - target: 443
                  published: 443
                  mode: host
                  protocol: tcp
              volumes:
                - /var/run/docker.sock:/var/run/docker.sock:ro
                - {{ data_root }}/traefik/certs:/certificates
              networks:
                - proxy_public
              environment:
                - DOCKER_API_VERSION=1.44
              deploy:
                mode: global
                placement:
                  constraints:
                    - node.role == manager
                restart_policy:
                  condition: on-failure
                  delay: 5s
                  max_attempts: 3
                resources:
                  limits:
                    cpus: '1.0'
                    memory: 1G
                  reservations:
                    cpus: '0.2'
                    memory: 256M
                labels:
                  # Basic Dashboard Routing
                  - "traefik.enable=true"
                  - "traefik.http.routers.traefik.rule=Host(`traefik.{{ domain }}`)"
                  - "traefik.http.routers.traefik.entrypoints=https"
                  - "traefik.http.routers.traefik.tls=true"
                  - "traefik.http.routers.traefik.tls.certresolver=le"
                  - "traefik.http.routers.traefik.service=api@internal"
                  - "traefik.http.routers.traefik.middlewares=security-headers,ratelimit,dashboard-auth"
                  - "traefik.http.middlewares.dashboard-auth.basicauth.users=admin:$$apr1$$WbKmV.3h$$n1BAl6Y1.Hh/44oYkto011"
                  - "traefik.http.services.traefik-svc.loadbalancer.server.port=8080"
                  - "traefik.swarm.network=proxy_public"
                  # Secure TLS Definition
                  - "traefik.tls.options.secure-tls-options.minversion=VersionTLS12"
                  - "traefik.tls.options.secure-tls-options.ciphersuites=TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_CHACHA20_POLY1305_SHA256"
              healthcheck:
                test: ["CMD", "traefik", "healthcheck", "--ping"]
                interval: 30s
                retries: 3

          networks:
            proxy_public:
              external: true



    - name: Deploy Traefik stack
      command: docker stack deploy -c /tmp/traefik-compose.yml traefik --with-registry-auth

    - name: Wait for Traefik to start
      pause:
        seconds: 15

    # ── 3. Deploy Portainer ───────────────────────────────────
    - name: Create Portainer compose file
      copy:
        dest: /tmp/portainer-compose.yml
        content: |
          version: '3.8'

          services:
            portainer-agent:
              image: portainer/agent:2.21.5
              volumes:
                - /var/run/docker.sock:/var/run/docker.sock
                - /var/lib/docker/volumes:/var/lib/docker/volumes
              networks:
                - portainer_agent
              deploy:
                mode: global
                placement:
                  constraints:
                    - node.platform.os == linux
                resources:
                  limits:
                    cpus: '0.5'
                    memory: 512M
                  reservations:
                    cpus: '0.1'
                    memory: 64M

            portainer:
              image: portainer/portainer-ce:2.21.5
              command: -H tcp://tasks.portainer-agent:9001 --tlsskipverify
              volumes:
                - {{ data_root }}/portainer/data:/data
              networks:
                - portainer_agent
                - proxy_public
              logging:
                driver: "json-file"
                options:
                  max-size: "10m"
                  max-file: "3"
              deploy:
                mode: replicated
                replicas: 1
                restart_policy:
                  condition: on-failure
                  delay: 5s
                  max_attempts: 3
                  window: 120s
                update_config:
                  parallelism: 1
                  delay: 10s
                  order: start-first
                  failure_action: rollback
                resources:
                  limits:
                    cpus: '0.5'
                    memory: 512M
                  reservations:
                    cpus: '0.1'
                    memory: 128M
                placement:
                  constraints:
                    - node.role == manager
                labels:
                  - "traefik.enable=true"
                  - "traefik.http.routers.portainer.rule=Host(`portainer.{{ domain }}`)"
                  - "traefik.http.routers.portainer.entrypoints=https"
                  - "traefik.http.routers.portainer.tls.certresolver=le"
                  - "traefik.http.routers.portainer.middlewares=security-headers,ratelimit"
                  - "traefik.http.services.portainer.loadbalancer.server.port=9443"
                  - "traefik.http.services.portainer.loadbalancer.server.scheme=https"
                  - "traefik.swarm.network=proxy_public"

          networks:
            portainer_agent:
              driver: overlay
              attachable: true
            proxy_public:
              external: true

    - name: Deploy Portainer stack
      command: docker stack deploy -c /tmp/portainer-compose.yml portainer --with-registry-auth

    # ── 4. Setup Traefik Middlewares ──────────────────────────
    - name: Create middlewares compose file
      copy:
        dest: /tmp/middlewares-compose.yml
        content: |
          version: '3.8'

          services:
            # Dummy service để tạo global middlewares
            _middlewares:
              image: alpine:latest
              command: ["echo", "middlewares"]
              networks:
                - proxy_public
              deploy:
                replicas: 0
                labels:
                  # Rate limiting
                  - "traefik.http.middlewares.ratelimit.ratelimit.average=100"
                  - "traefik.http.middlewares.ratelimit.ratelimit.burst=50"
                  # Security headers (Chuẩn bảo mật Enterprise)
                  - "traefik.http.middlewares.security-headers.headers.framedeny=true"
                  - "traefik.http.middlewares.security-headers.headers.browserxssfilter=true"
                  - "traefik.http.middlewares.security-headers.headers.contenttypenosniff=true"
                  - "traefik.http.middlewares.security-headers.headers.stsseconds=31536000"
                  - "traefik.http.middlewares.security-headers.headers.stsincludesubdomains=true"
                  - "traefik.http.middlewares.security-headers.headers.stspreload=true"
                  - "traefik.http.middlewares.security-headers.headers.referrerpolicy=strict-origin-when-cross-origin"
                  - "traefik.http.middlewares.security-headers.headers.permissionspolicy=geolocation=(), microphone=(), camera=()"
                  - "traefik.http.middlewares.security-headers.headers.contentsecuritypolicy=default-src 'self' 'unsafe-inline' 'unsafe-eval' data:;"
                  - "traefik.enable=true"
                  - "traefik.swarm.network=proxy_public"

          networks:
            proxy_public:
              external: true

    - name: Deploy middlewares
      command: docker stack deploy -c /tmp/middlewares-compose.yml middlewares

    - name: Done
      debug:
        msg: |
          ✅ Tier 1 deployed successfully!
          Traefik:   https://traefik.{{ domain }}
          Portainer: https://portainer.{{ domain }}
