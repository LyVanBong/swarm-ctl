---
# node-remove.yml - Drain và xóa node khỏi Docker Swarm
# Chạy bởi: swarm-ctl node remove --ip X.X.X.X

- name: "🗑️  Remove node from Swarm cluster"
  hosts: localhost
  gather_facts: false

  vars:
    master_ip: ""
    target_ip: ""
    force: false

  tasks:

    - name: Validate required vars
      fail:
        msg: "master_ip và target_ip là bắt buộc"
      when: master_ip == '' or target_ip == ''

    # ── 1. Get node ID ────────────────────────────────────────
    - name: Get node ID by IP
      command: >
        docker node ls
        --filter "addr={{ target_ip }}"
        --format "{{ '{{' }}.ID{{ '}}' }}"
      delegate_to: "{{ master_ip }}"
      register: node_id
      failed_when: node_id.stdout == ''

    - name: Show node to remove
      debug:
        msg: "Chuẩn bị xóa node {{ target_ip }} (ID: {{ node_id.stdout }})"

    # ── 2. Drain node ─────────────────────────────────────────
    - name: Set node availability to drain
      command: >
        docker node update
        --availability drain
        {{ node_id.stdout }}
      delegate_to: "{{ master_ip }}"

    - name: Wait for tasks to reschedule (30s)
      pause:
        seconds: 30

    # ── 3. Check node role ─────────────────────────────────────
    - name: Check if node is manager
      command: >
        docker node inspect
        {{ node_id.stdout }}
        --format "{{ '{{' }}.Spec.Role{{ '}}' }}"
      delegate_to: "{{ master_ip }}"
      register: node_role

    # ── 4. Demote if manager ───────────────────────────────────
    - name: Demote manager before removing
      command: "docker node demote {{ node_id.stdout }}"
      delegate_to: "{{ master_ip }}"
      when: node_role.stdout == 'manager'

    - name: Wait after demotion
      pause:
        seconds: 10
      when: node_role.stdout == 'manager'

    # ── 5. Leave Swarm on target node ─────────────────────────
    - name: Leave Swarm
      command: "docker swarm leave --force"
      delegate_to: "{{ target_ip }}"
      ignore_errors: true

    # ── 6. Remove from Swarm ──────────────────────────────────
    - name: Remove node from Swarm
      command: "docker node rm {{ node_id.stdout }} --force"
      delegate_to: "{{ master_ip }}"

    - name: Done
      debug:
        msg: "✅ Node {{ target_ip }} đã được xóa khỏi cluster"
